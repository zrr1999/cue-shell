name: "CD - Publish"

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

concurrency:
  group: cd-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build-wheel:
    name: wheel (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            artifact: wheel-linux-x86_64
          - label: macos-x86_64
            runner: macos-15-intel
            artifact: wheel-macos-x86_64
          - label: macos-arm64
            runner: macos-14
            artifact: wheel-macos-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-wheel-${{ matrix.label }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.13.3
          rust-toolchain: "1.95"
          command: build
          manylinux: "2014"
          args: --release --locked --compatibility pypi --out dist

      - name: Smoke-test built wheel
        shell: bash
        run: |
          repo_root="$PWD"
          wheel_path="$repo_root/dist/$(basename dist/*.whl)"
          uv tool run --from "$wheel_path" cue --version
          uv tool run --from "$wheel_path" cue --help
          uv tool run --from "$wheel_path" cue-client --version
          uv tool run --from "$wheel_path" cue-client target resolve --json
          uv tool run --from "$wheel_path" cue-client target list --json
          uv tool run --from "$wheel_path" cue-tui --version
          uv tool run --from "$wheel_path" cue-daemon --version
          uv tool run --from "$wheel_path" cued --version
          uv tool run --from "$wheel_path" cue client target resolve --json
          uv tool run --from "$wheel_path" cue daemon --version
          if uv tool run --from "$wheel_path" cue target resolve --json; then
            echo "cue target unexpectedly succeeded" >&2
            exit 1
          fi
          uv tool run --from "$wheel_path" cued status

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: cue-shell-${{ matrix.artifact }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-sdist

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.13.3
          rust-toolchain: "1.95"
          command: sdist
          args: --out dist

      - name: Smoke-test source distribution
        shell: bash
        run: |
          repo_root="$PWD"
          sdist_path="$repo_root/dist/$(basename dist/*.tar.gz)"
          uv tool run --from "$sdist_path" cue --version
          uv tool run --from "$sdist_path" cue --help
          uv tool run --from "$sdist_path" cue-client --version
          uv tool run --from "$sdist_path" cue-client target resolve --json
          uv tool run --from "$sdist_path" cue-client target list --json
          uv tool run --from "$sdist_path" cue-tui --version
          uv tool run --from "$sdist_path" cue-daemon --version
          uv tool run --from "$sdist_path" cued --version
          uv tool run --from "$sdist_path" cue client target resolve --json
          uv tool run --from "$sdist_path" cue daemon --version
          if uv tool run --from "$sdist_path" cue target resolve --json; then
            echo "cue target unexpectedly succeeded" >&2
            exit 1
          fi
          uv tool run --from "$sdist_path" cued status

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: cue-shell-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs:
      - build-wheel
      - build-sdist
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: cue-shell-*
          path: dist
          merge-multiple: true
      - name: List release artifacts
        run: ls -1 dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: github-release
    runs-on: ubuntu-latest
    needs:
      - build-wheel
      - build-sdist
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: cue-shell-*
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
