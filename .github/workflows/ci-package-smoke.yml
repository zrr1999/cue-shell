name: "CI - Package Smoke"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-package-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build-wheel:
    name: wheel (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
          - label: macos-x86_64
            runner: macos-15-intel
          - label: macos-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.13.3
          rust-toolchain: "1.95"
          command: build
          manylinux: "2014"
          args: --release --locked --compatibility pypi --out dist

      - name: Smoke-test built wheel
        shell: bash
        run: |
          repo_root="$PWD"
          wheel_path="$repo_root/dist/$(basename dist/*.whl)"
          uv tool run --from "$wheel_path" cue --version
          uv tool run --from "$wheel_path" cue --help
          uv tool run --from "$wheel_path" cue-client --version
          uv tool run --from "$wheel_path" cue-client target resolve --json
          uv tool run --from "$wheel_path" cue-client target list --json
          uv tool run --from "$wheel_path" cue-tui --version
          uv tool run --from "$wheel_path" cue-daemon --version
          uv tool run --from "$wheel_path" cued --version
          uv tool run --from "$wheel_path" cue client target resolve --json
          uv tool run --from "$wheel_path" cue daemon --version
          if uv tool run --from "$wheel_path" cue target resolve --json; then
            echo "cue target unexpectedly succeeded" >&2
            exit 1
          fi
          uv tool run --from "$wheel_path" cued status

  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.13.3
          rust-toolchain: "1.95"
          command: sdist
          args: --out dist

      - name: Smoke-test source distribution
        shell: bash
        run: |
          repo_root="$PWD"
          sdist_path="$repo_root/dist/$(basename dist/*.tar.gz)"
          uv tool run --from "$sdist_path" cue --version
          uv tool run --from "$sdist_path" cue --help
          uv tool run --from "$sdist_path" cue-client --version
          uv tool run --from "$sdist_path" cue-client target resolve --json
          uv tool run --from "$sdist_path" cue-client target list --json
          uv tool run --from "$sdist_path" cue-tui --version
          uv tool run --from "$sdist_path" cue-daemon --version
          uv tool run --from "$sdist_path" cued --version
          uv tool run --from "$sdist_path" cue client target resolve --json
          uv tool run --from "$sdist_path" cue daemon --version
          if uv tool run --from "$sdist_path" cue target resolve --json; then
            echo "cue target unexpectedly succeeded" >&2
            exit 1
          fi
          uv tool run --from "$sdist_path" cued status
