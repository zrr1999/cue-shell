[default]
extend-ignore-words-re = ["^[a-zA-Z]{1,3}$"]
extend-ignore-re = [
  "(?Rm)^.*(#|//)\\s*typos:\\s*disable-line$",
  "(?s)(#|//)\\s*typos:\\s*off.*?\\n\\s*(#|//)\\s*typos:\\s*on",
]

[default.extend-words]
# cue-shell specific terms
cued = "cued"
cron = "cron"
tui = "tui"
ratatui = "ratatui"
# Intentional typo fixtures used by tests that assert unknown-section
# errors against client.toml.
transprt = "transprt"

[files]
extend-exclude = ["docs/research/"]
